<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfinityFirst — Coming Soon</title>
  <meta name="description" content="InfinityFirst — Pioneering AI Excellence. Coming Soon.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineGrow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes canvasFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .infinity-mark     { animation: fadeUp 1.0s ease-out 0.1s both; }
    .meridian-title    { animation: fadeUp 0.9s ease-out 0.35s both; }
    .meridian-tagline  { animation: fadeUp 0.7s ease-out 0.65s both; }
    .meridian-line     { animation: lineGrow 0.6s ease-out 0.9s both; }
    .meridian-subtitle { animation: fadeUp 0.6s ease-out 1.1s both; }
    .meridian-footer   { animation: fadeUp 0.5s ease-out 1.3s both; }
    .network-canvas    { animation: canvasFadeIn 1.8s ease-out 0.2s both; }
  </style>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const hexToRgb = (hex) => {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r}, ${g}, ${b}`;
    };

    const bgColorMap = { Warm: '#f7f6f1', Cool: '#f1f3f7', Neutral: '#f5f5f5' };
    const densityMap = { Sparse: 30, Medium: 50, Dense: 72 };

    const lemniscatePos = (t, a, cx, cy) => {
      const d = 1 + Math.sin(t) * Math.sin(t);
      return {
        x: cx + a * Math.cos(t) / d,
        y: cy + a * Math.sin(t) * Math.cos(t) / d,
      };
    };

    /* ---- InfinityMark ---- */
    const InfinityMark = ({ accent }) => {
      const canvasRef = useRef(null);
      const animRef = useRef(null);
      const rgbRef = useRef(hexToRgb(accent));
      useEffect(() => { rgbRef.current = hexToRgb(accent); }, [accent]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const cw = 280, ch = 140;
        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const A = 95, CX = cw / 2, CY = ch / 2, N = 26;

        const draw = (time) => {
          ctx.clearRect(0, 0, cw, ch);
          const rgb = rgbRef.current;
          const breathe = 1 + Math.sin(time * 0.0005) * 0.025;

          const nodes = [];
          for (let i = 0; i < N; i++) {
            const t = (i / N) * Math.PI * 2;
            const p = lemniscatePos(t, A, CX, CY);
            nodes.push({
              x: CX + (p.x - CX) * breathe,
              y: CY + (p.y - CY) * breathe,
            });
          }

          // Path outline
          ctx.beginPath();
          for (let i = 0; i <= 200; i++) {
            const t = (i / 200) * Math.PI * 2;
            const p = lemniscatePos(t, A, CX, CY);
            const x = CX + (p.x - CX) * breathe;
            const y = CY + (p.y - CY) * breathe;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.strokeStyle = `rgba(${rgb}, 0.1)`;
          ctx.lineWidth = 0.6;
          ctx.stroke();

          // Adjacent connections
          for (let i = 0; i < N; i++) {
            const j = (i + 1) % N;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(${rgb}, 0.22)`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }

          // Cross-connections
          for (let i = 0; i < N; i++) {
            for (let skip = 2; skip <= 4; skip++) {
              const j = (i + skip) % N;
              const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
              if (d < 55) {
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(${rgb}, 0.07)`;
                ctx.lineWidth = 0.4;
                ctx.stroke();
              }
            }
          }

          // Nodes
          for (let i = 0; i < N; i++) {
            const pulse = Math.sin(time * 0.0018 + i * 0.45) * 0.5 + 0.5;
            const r = 1.4 + pulse * 0.6;
            ctx.beginPath();
            ctx.arc(nodes[i].x, nodes[i].y, r + 5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, ${0.02 + pulse * 0.025})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(nodes[i].x, nodes[i].y, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, ${0.3 + pulse * 0.2})`;
            ctx.fill();
          }

          // Data pulses
          const speeds = [0.00038, -0.00025];
          for (const sp of speeds) {
            const pt = ((time * sp) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
            const p = lemniscatePos(pt, A, CX, CY);
            const px = CX + (p.x - CX) * breathe;
            const py = CY + (p.y - CY) * breathe;
            ctx.beginPath();
            ctx.arc(px, py, 12, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, 0.05)`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(px, py, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, 0.55)`;
            ctx.fill();
          }

          animRef.current = requestAnimationFrame(draw);
        };

        animRef.current = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(animRef.current);
      }, []);

      return (
        <canvas ref={canvasRef} className="infinity-mark"
          style={{ width: 280, height: 140, pointerEvents: 'none' }}
        ></canvas>
      );
    };

    /* ---- NetworkCanvas ---- */
    const NetworkCanvas = ({ accentColor, density }) => {
      const canvasRef = useRef(null);
      const animRef = useRef(null);
      const accentRef = useRef(hexToRgb(accentColor));
      useEffect(() => { accentRef.current = hexToRgb(accentColor); }, [accentColor]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let w, h;

        const resize = () => {
          const dpr = window.devicePixelRatio || 1;
          w = window.innerWidth; h = window.innerHeight;
          canvas.width = w * dpr; canvas.height = h * dpr;
          canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        };
        resize();
        window.addEventListener('resize', resize);

        const count = densityMap[density] || 50;
        const hubCount = Math.max(4, Math.floor(count * 0.09));
        const particles = [];
        for (let i = 0; i < count; i++) {
          const isHub = i < hubCount;
          particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * (isHub ? 0.1 : 0.2),
            vy: (Math.random() - 0.5) * (isHub ? 0.1 : 0.2),
            r: isHub ? 2.8 + Math.random() * 1.2 : Math.random() * 1.5 + 0.9,
            isHub, phase: Math.random() * Math.PI * 2,
          });
        }

        const connDist = 175;

        const draw = (time) => {
          ctx.clearRect(0, 0, w, h);
          const rgb = accentRef.current;
          const cx = w / 2, cy = h / 2;

          // Central glow
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 380);
          grad.addColorStop(0, `rgba(${rgb}, 0.028)`);
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);

          // Rings
          for (const r of [150, 270, 410]) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${rgb}, 0.055)`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }

          // Cross axes
          ctx.save();
          ctx.strokeStyle = `rgba(${rgb}, 0.04)`;
          ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(cx - 480, cy); ctx.lineTo(cx + 480, cy); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx, cy - 320); ctx.lineTo(cx, cy + 320); ctx.stroke();
          ctx.restore();

          // Tick marks
          ctx.save();
          ctx.strokeStyle = `rgba(${rgb}, 0.065)`;
          ctx.lineWidth = 0.5;
          for (const r of [150, 270, 410]) {
            ctx.beginPath(); ctx.moveTo(cx+r, cy-4); ctx.lineTo(cx+r, cy+4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-r, cy-4); ctx.lineTo(cx-r, cy+4); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-4, cy+r); ctx.lineTo(cx+4, cy+r); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx-4, cy-r); ctx.lineTo(cx+4, cy-r); ctx.stroke();
          }
          ctx.restore();

          // Corner brackets
          const m = 28, bl = 22;
          ctx.save();
          ctx.strokeStyle = `rgba(${rgb}, 0.1)`;
          ctx.lineWidth = 0.8;
          ctx.beginPath(); ctx.moveTo(m, m+bl); ctx.lineTo(m, m); ctx.lineTo(m+bl, m); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(w-m-bl, m); ctx.lineTo(w-m, m); ctx.lineTo(w-m, m+bl); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(m, h-m-bl); ctx.lineTo(m, h-m); ctx.lineTo(m+bl, h-m); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(w-m-bl, h-m); ctx.lineTo(w-m, h-m); ctx.lineTo(w-m, h-m-bl); ctx.stroke();
          ctx.restore();

          // Particles
          for (const p of particles) {
            p.x += p.vx; p.y += p.vy;
            if (p.x < -30) p.x = w + 30;
            if (p.x > w + 30) p.x = -30;
            if (p.y < -30) p.y = h + 30;
            if (p.y > h + 30) p.y = -30;

            const pulse = p.isHub ? Math.sin(time * 0.0008 + p.phase) * 0.5 + 0.5 : 0;
            const radius = p.isHub ? p.r + pulse * 1.5 : p.r;
            const alpha = p.isHub ? 0.28 + pulse * 0.22 : 0.32;

            if (p.isHub) {
              ctx.beginPath();
              ctx.arc(p.x, p.y, radius + 10, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(${rgb}, ${0.03 + pulse * 0.04})`;
              ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, ${alpha})`;
            ctx.fill();
          }

          // Connections
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < connDist) {
                const strength = 1 - dist / connDist;
                const boost = particles[i].isHub || particles[j].isHub ? 1.6 : 1;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(${rgb}, ${strength * 0.13 * boost})`;
                ctx.lineWidth = particles[i].isHub || particles[j].isHub ? 0.9 : 0.5;
                ctx.stroke();
              }
            }
          }

          animRef.current = requestAnimationFrame(draw);
        };

        animRef.current = requestAnimationFrame(draw);
        return () => {
          window.removeEventListener('resize', resize);
          cancelAnimationFrame(animRef.current);
        };
      }, [density]);

      return (
        <canvas ref={canvasRef} className="network-canvas"
          style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}
        ></canvas>
      );
    };

    /* ---- MeridianPage ---- */
    const MeridianPage = ({ tweaks }) => {
      const bg = bgColorMap[tweaks.bgTone] || '#f7f6f1';
      const accentRgb = hexToRgb(tweaks.accentColor);

      return (
        <div style={{
          width: '100vw', minHeight: '100vh', backgroundColor: bg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          position: 'relative', overflow: 'hidden',
          fontFamily: "'Manrope', sans-serif",
        }}>
          <div style={{
            position: 'absolute', inset: 0,
            backgroundImage: `radial-gradient(circle, rgba(${accentRgb}, 0.045) 1px, transparent 1px)`,
            backgroundSize: '32px 32px', pointerEvents: 'none',
          }}></div>
          <div style={{
            position: 'absolute', inset: 0,
            background: 'radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.04) 100%)',
            pointerEvents: 'none',
          }}></div>

          <NetworkCanvas accentColor={tweaks.accentColor} density={tweaks.density} />

          <div style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            position: 'relative', zIndex: 1,
          }}>
            <InfinityMark accent={tweaks.accentColor} />

            <h1 className="meridian-title" style={{
              margin: 0, marginTop: '-8px',
              fontSize: 'clamp(50px, 9vw, 84px)',
              color: '#141414', textAlign: 'center', lineHeight: 1.1,
            }}>
              <span style={{ display: 'block', fontWeight: 300, letterSpacing: '0.04em' }}>Infinity</span>
              <span style={{ display: 'block', fontWeight: 800, letterSpacing: '-0.01em' }}>First</span>
            </h1>

            <p className="meridian-tagline" style={{
              fontSize: 'clamp(10px, 1.3vw, 13px)', fontWeight: 500,
              color: '#909090', letterSpacing: '0.28em',
              textTransform: 'uppercase', marginTop: '24px',
            }}>Pioneering AI Excellence</p>

            <div className="meridian-line" style={{
              width: '40px', height: '2px',
              backgroundColor: tweaks.accentColor,
              marginTop: '24px', marginBottom: '20px',
            }}></div>

            <p className="meridian-subtitle" style={{
              fontSize: '10px', fontWeight: 500,
              color: '#b5b5b5', letterSpacing: '0.4em',
              textTransform: 'uppercase', margin: 0,
            }}>Coming Soon</p>
          </div>

          <p className="meridian-footer" style={{
            position: 'absolute', bottom: '28px',
            fontSize: '9px', fontWeight: 400,
            color: '#c8c8c8', letterSpacing: '0.15em',
          }}>© 2026 InfinityFirst</p>
        </div>
      );
    };

    /* ---- App ---- */
    const App = () => {
      const tweaks = {
        accentColor: '#b5935e',
        bgTone: 'Warm',
        density: 'Dense',
      };
      return <MeridianPage tweaks={tweaks} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
